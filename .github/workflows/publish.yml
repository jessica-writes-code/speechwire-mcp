name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if tag is on dev
        id: check
        run: |
          if git branch -r --contains "${{ github.ref_name }}" | grep -q 'origin/dev'; then
            echo "on_dev=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.on_dev == 'true'
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.check.outputs.on_dev == 'true'
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if tag is on main
        id: check
        run: |
          if git branch -r --contains "${{ github.ref_name }}" | grep -q 'origin/main'; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.on_main == 'true'
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        if: steps.check.outputs.on_main == 'true'

